<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thooval Layout Engine - Spatial Architecture</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&family=Noto+Sans+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #2c2c2c; color: #fff; overflow: hidden; }
        
        .top-bar { background: #1e1e1e; padding: 12px 20px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .branding { font-weight: bold; letter-spacing: 0.5px; }
        .file-menu { display: flex; gap: 10px; }
        .file-btn { background: #3a3a3a; color: #ddd; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .file-btn:hover { background: #505050; color: #fff; }
        .file-btn.export-btn { background: #0056b3; border-color: #004494; color: white; }
        .file-btn.export-btn:hover { background: #0069d9; }
        
        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .toolbar-left { width: 70px; background: #252525; padding: 15px 10px; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .toolbar-left button, .toolbar-left label.upload-btn { display: flex; justify-content: center; align-items: center; width: 45px; height: 45px; cursor: pointer; background: #3a3a3a; color: #ddd; border: 1px solid #555; border-radius: 8px; font-size: 18px; transition: all 0.2s; }
        .toolbar-left button:hover, .toolbar-left label.upload-btn:hover { background: #505050; color: #fff; border-color: #777; }
        .delete-btn { margin-top: auto; background: #4a1c1c !important; border-color: #702a2a !important; color: #ff9999 !important; }
        #image-upload { display: none; }
        
        .panel-right { width: 280px; background: #252525; padding: 15px; border-left: 1px solid #444; overflow-y: auto; display: flex; flex-direction: column; z-index: 100; }
        .panel-section { border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        .panel-right h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        
        .prop-group { margin-bottom: 10px; }
        .prop-group label { display: block; font-size: 12px; color: #ccc; margin-bottom: 4px; }
        .prop-group input[type="color"], .prop-group input[type="range"], .prop-group select, .prop-group input[type="number"] { width: 100%; background: #1a1a1a; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 13px; }
        
        .btn-group { display: flex; gap: 5px; }
        .btn-group button { flex: 1; padding: 6px; background: #3a3a3a; color: white; border: 1px solid #555; border-radius: 3px; cursor: pointer; font-size: 12px;}
        .btn-group button:hover { background: #505050; }

        /* Document Manager UI */
        .doc-btn { width: 100%; padding: 8px; background: #3a3a3a; border: 1px solid #555; color: #fff; border-radius: 4px; cursor: pointer; margin-bottom: 8px; font-size: 13px; }
        .doc-btn:hover { background: #444; }
        .doc-btn.master-active { background: #8b6b00; border-color: #cca418; font-weight: bold; }
        .master-banner { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #cca418; color: #000; padding: 5px 20px; border-radius: 20px; font-weight: bold; z-index: 200; pointer-events: none; }

        /* The Canvas Area */
        .canvas-container-wrapper { flex: 1; background: #151515; position: relative; overflow: hidden; /* Scrollbars removed, handled by canvas pan */ }
        .canvas-container { position: absolute !important; top: 0; left: 0; }
        
        /* Hint text for panning */
        .pan-hint { position: absolute; bottom: 15px; left: 15px; color: #666; font-size: 12px; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="branding">Thooval Layout Engine <span style="color:#888; font-weight:normal; font-size: 14px;">| Spatial Mode</span></div>
        <div class="file-menu">
            <button class="file-btn export-btn" id="export-pdf-btn" title="Export to Printable PDF">
                <i class="fa-solid fa-file-pdf"></i> Export PDF
            </button>
        </div>
    </header>

    <div class="workspace">
        <div class="master-banner" id="master-banner"><i class="fa-solid fa-crown"></i> Editing Master Page</div>
        
        <aside class="toolbar-left">
            <button id="add-rect" title="Add Rectangle"><i class="fa-solid fa-square"></i></button>
            <button id="add-text" title="Add Typography"><i class="fa-solid fa-font"></i></button>
            <label class="upload-btn" title="Place Image">
                <i class="fa-solid fa-image"></i>
                <input type="file" id="image-upload" accept="image/*">
            </label>
            <button id="delete-obj" class="delete-btn" title="Delete Selected Object"><i class="fa-solid fa-trash"></i></button>
        </aside>

        <main class="canvas-container-wrapper" id="workspace-wrapper">
            <canvas id="layout-canvas"></canvas>
            <div class="pan-hint">Hold <b>Spacebar</b> + Drag to Pan • <b>Scroll Wheel</b> to Scroll Vertical</div>
        </main>

        <aside class="panel-right">
            <div class="panel-section">
                <h3>Document Pages</h3>
                <div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Total Pages: <span id="page-count-display">1</span></div>
                <button class="doc-btn" id="add-page-btn"><i class="fa-solid fa-plus"></i> Add New Page</button>
                <hr style="border-color:#444; margin: 15px 0;">
                <button class="doc-btn" id="toggle-master-btn"><i class="fa-solid fa-crown"></i> Edit Master Page</button>
            </div>

            <div id="no-selection" style="color: #777; font-size: 13px; font-style: italic; text-align: center; margin-top: 20px;">Select an object to edit properties.</div>
            
            <div id="properties-form" style="display: none;">
                <div class="panel-section">
                    <h3>Appearance</h3>
                    <div class="prop-group">
                        <label>Fill Color:</label>
                        <input type="color" id="obj-fill">
                    </div>
                </div>

                <div id="text-properties" class="panel-section" style="display: none;">
                    <h3>Typography</h3>
                    <div class="prop-group">
                        <label>Font Family:</label>
                        <select id="obj-font-family">
                            <option value="sans-serif">System Default</option>
                            <option value="'Manjari', sans-serif">Manjari</option>
                            <option value="'Noto Sans Malayalam', sans-serif">Noto Sans Malayalam</option>
                        </select>
                    </div>
                    <div class="prop-group">
                        <label>Font Size:</label>
                        <input type="number" id="obj-font-size" min="8" max="144" value="24">
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        $(document).ready(function() {
            
            // --- CONSTANTS & ARCHITECTURE SETUP ---
            const PAGE_W = 600;
            const PAGE_H = 800;
            const PAGE_GAP = 50; 
            const MARGIN_LEFT = 100; // Give some pasteboard space on the left
            const MARGIN_TOP = 50;
            
            let totalPages = 1;
            let isMasterMode = false;

            // Initialize canvas to strictly fill the dynamic wrapper size
            const wrapper = $('#workspace-wrapper');
            const canvas = new fabric.Canvas('layout-canvas', {
                width: wrapper.width(),
                height: wrapper.height(),
                selection: true,
                preserveObjectStacking: true
            });

            // Keep canvas responsive to window resizing
            $(window).resize(function() {
                canvas.setWidth(wrapper.width());
                canvas.setHeight(wrapper.height());
            });


            // --- 1. DRAWING THE SPATIAL PAGES (The "Paper") ---
            function drawPaperBackgrounds() {
                // Clear existing paper
                const objects = canvas.getObjects();
                objects.forEach(obj => { if (obj.isPaper) canvas.remove(obj); });

                // If in Master mode, only draw ONE page for reference
                const pagesToDraw = isMasterMode ? 1 : totalPages;

                for (let i = 0; i < pagesToDraw; i++) {
                    const paper = new fabric.Rect({
                        left: MARGIN_LEFT,
                        top: MARGIN_TOP + (i * (PAGE_H + PAGE_GAP)),
                        width: PAGE_W,
                        height: PAGE_H,
                        fill: '#ffffff',
                        selectable: false, // User cannot click it
                        evented: false,    // Clicks pass through it
                        isPaper: true,     // Custom tag so we can identify it later
                        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.5)', blur: 15, offsetX: 0, offsetY: 5 })
                    });
                    canvas.add(paper);
                    paper.sendToBack(); // Keep paper beneath all text and images
                }
            }
            drawPaperBackgrounds();


            // --- 2. THE PAN & ZOOM ENGINE (Continuous View) ---
            let isDragging = false;
            let isSpacePressed = false;
            let lastPosX, lastPosY;

            // Spacebar logic
            $(window).keydown(function(e) {
                if (e.code === 'Space' && !canvas.getActiveObject()?.isEditing) {
                    isSpacePressed = true;
                    canvas.defaultCursor = 'grab';
                    e.preventDefault(); // Prevent page scroll down
                }
            });
            $(window).keyup(function(e) {
                if (e.code === 'Space') {
                    isSpacePressed = false;
                    canvas.defaultCursor = 'default';
                }
            });

            // Middle mouse click & Spacebar Dragging
            canvas.on('mouse:down', function(opt) {
                const evt = opt.e;
                if (isSpacePressed || evt.button === 1) { // 1 is middle mouse button
                    isDragging = true;
                    canvas.selection = false;
                    canvas.defaultCursor = 'grabbing';
                    lastPosX = evt.clientX;
                    lastPosY = evt.clientY;
                }
            });

            canvas.on('mouse:move', function(opt) {
                if (isDragging) {
                    const e = opt.e;
                    let vpt = canvas.viewportTransform;
                    // Move the mathematical camera relative to mouse movement
                    vpt[4] += e.clientX - lastPosX;
                    vpt[5] += e.clientY - lastPosY;
                    canvas.requestRenderAll();
                    lastPosX = e.clientX;
                    lastPosY = e.clientY;
                }
            });

            canvas.on('mouse:up', function() {
                canvas.setViewportTransform(canvas.viewportTransform);
                isDragging = false;
                canvas.selection = true;
                if (!isSpacePressed) canvas.defaultCursor = 'default';
            });

            // Standard Scroll Wheel for Vertical Movement
            canvas.on('mouse:wheel', function(opt) {
                let delta = opt.e.deltaY;
                let vpt = canvas.viewportTransform;
                // Move camera up and down naturally
                vpt[5] -= delta;
                canvas.requestRenderAll();
                opt.e.preventDefault();
                opt.e.stopPropagation();
            });


            // --- 3. THE MASTER PAGES ENGINE ---
            $('#toggle-master-btn').click(function() {
                isMasterMode = !isMasterMode;
                canvas.discardActiveObject();

                if (isMasterMode) {
                    // ENTER MASTER MODE
                    $(this).addClass('master-active').html('<i class="fa-solid fa-check"></i> Save & Close Master');
                    $('#master-banner').fadeIn();
                    $('#add-page-btn').prop('disabled', true).css('opacity', 0.5);

                    // Move camera back to top
                    canvas.viewportTransform[4] = 0;
                    canvas.viewportTransform[5] = 0;

                    // Hide normal objects, delete clones, show master source objects
                    canvas.getObjects().forEach(obj => {
                        if (obj.isPaper) return;
                        if (obj.isRegular) obj.set('opacity', 0).set('selectable', false); // Hide standard content
                        if (obj.isMasterClone) canvas.remove(obj); // Erase old clones
                        if (obj.isMasterSource) obj.set('opacity', 1).set('selectable', true).set('evented', true); // Reveal master components
                    });

                } else {
                    // EXIT MASTER MODE & APPLY TO ALL PAGES
                    $(this).removeClass('master-active').html('<i class="fa-solid fa-crown"></i> Edit Master Page');
                    $('#master-banner').fadeOut();
                    $('#add-page-btn').prop('disabled', false).css('opacity', 1);

                    // 1. Hide master sources, reveal regular content
                    canvas.getObjects().forEach(obj => {
                        if (obj.isRegular) obj.set('opacity', 1).set('selectable', true);
                        if (obj.isMasterSource) obj.set('opacity', 0).set('selectable', false).set('evented', false);
                    });

                    // 2. The Magic Trick: Clone the master sources onto every regular page
                    const sources = canvas.getObjects().filter(o => o.isMasterSource);
                    
                    for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
                        sources.forEach(sourceObj => {
                            sourceObj.clone(function(clone) {
                                // Adjust Y position so it lands exactly on the correct page
                                const newTop = clone.top + (pageIndex * (PAGE_H + PAGE_GAP));
                                clone.set({
                                    top: newTop,
                                    selectable: false, // Locked!
                                    evented: false,
                                    isMasterClone: true // Tagged so we can delete it next time we edit master
                                });
                                canvas.add(clone);
                                clone.sendToBack(); // Behind text, but...
                            });
                        });
                    }
                    // Make sure paper stays at the absolute bottom
                    canvas.getObjects().forEach(obj => { if(obj.isPaper) obj.sendToBack(); });
                }
                
                drawPaperBackgrounds();
                canvas.requestRenderAll();
            });


            // --- 4. MULTI-PAGE MANAGEMENT ---
            $('#add-page-btn').click(function() {
                totalPages++;
                $('#page-count-display').text(totalPages);
                drawPaperBackgrounds();
                
                // If we have master objects, immediately stamp them onto the new page
                const sources = canvas.getObjects().filter(o => o.isMasterSource);
                sources.forEach(sourceObj => {
                    sourceObj.clone(function(clone) {
                        const newTop = clone.top + ((totalPages - 1) * (PAGE_H + PAGE_GAP));
                        clone.set({ top: newTop, selectable: false, evented: false, isMasterClone: true });
                        canvas.add(clone);
                        clone.sendToBack();
                    });
                });
                canvas.getObjects().forEach(obj => { if(obj.isPaper) obj.sendToBack(); });
                canvas.requestRenderAll();
            });


            // --- 5. CREATING OBJECTS (With tagging logic) ---
            function tagAndAdd(obj) {
                // If we are editing master, this object belongs to the master layer. Otherwise, regular.
                if (isMasterMode) {
                    obj.set({ isMasterSource: true });
                } else {
                    obj.set({ isRegular: true });
                }
                canvas.add(obj);
                canvas.setActiveObject(obj);
            }

            // Calculate center of currently visible screen taking panning into account
            function getScreenCenter() {
                const vpt = canvas.viewportTransform;
                return {
                    x: (canvas.width / 2 - vpt[4]) / vpt[0],
                    y: (canvas.height / 2 - vpt[5]) / vpt[3]
                };
            }

            $('#add-rect').click(function() {
                const center = getScreenCenter();
                tagAndAdd(new fabric.Rect({ left: center.x, top: center.y, fill: '#6c757d', width: 100, height: 100 }));
            });

            $('#add-text').click(function() {
                const center = getScreenCenter();
                tagAndAdd(new fabric.IText('Hridayathil ninnu...', { left: center.x, top: center.y, fontFamily: 'sans-serif', fill: '#333333', fontSize: 24 }));
            });

            $('#image-upload').on('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        const center = getScreenCenter();
                        if (img.width > PAGE_W - 50) img.scaleToWidth(PAGE_W - 50);
                        img.set({ left: center.x, top: center.y });
                        tagAndAdd(img);
                    });
                };
                reader.readAsDataURL(file);
                $(this).val(''); 
            });


            // --- 6. PDF EXPORT (Adapted for Spatial Architecture) ---
            $('#export-pdf-btn').click(async function() {
                if (isMasterMode) {
                    alert("Please close the Master Page editor before exporting.");
                    return;
                }

                const originalText = $(this).html();
                $(this).html('<i class="fa-solid fa-spinner fa-spin"></i> Generating...').prop('disabled', true);
                canvas.discardActiveObject();

                // Save current camera view to restore later
                const originalVpt = [...canvas.viewportTransform];
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: [PAGE_W, PAGE_H] });

                for (let i = 0; i < totalPages; i++) {
                    if (i > 0) pdf.addPage();
                    
                    // Force the mathematical camera to perfectly frame the specific page coordinate
                    canvas.viewportTransform[4] = -MARGIN_LEFT; // X offset
                    canvas.viewportTransform[5] = -(MARGIN_TOP + (i * (PAGE_H + PAGE_GAP))); // Y offset
                    canvas.requestRenderAll();

                    // Wait a frame for rendering to finish
                    await new Promise(r => setTimeout(r, 50));
                    
                    // Take the photo of just the framed area
                    const imgData = canvas.toDataURL({ format: 'png', multiplier: 2, left: MARGIN_LEFT, top: MARGIN_TOP + (i * (PAGE_H + PAGE_GAP)), width: PAGE_W, height: PAGE_H });
                    pdf.addImage(imgData, 'PNG', 0, 0, PAGE_W, PAGE_H);
                }

                // Restore original camera view
                canvas.setViewportTransform(originalVpt);
                pdf.save('Thooval_Document.pdf');
                $(this).html(originalText).prop('disabled', false);
            });

            // --- 7. UI SYNC & DELETION (From previous versions) ---
            canvas.on('selection:created', updateUI); canvas.on('selection:updated', updateUI);
            canvas.on('selection:cleared', function() { $('#no-selection').show(); $('#properties-form').hide(); });

            function updateUI(event) {
                const obj = event.selected[0];
                if (!obj) return;
                $('#no-selection').hide(); $('#properties-form').show();
                if (obj.fill && typeof obj.fill === 'string') $('#obj-fill').val(obj.fill);

                if (obj.type === 'i-text' || obj.type === 'text') {
                    $('#text-properties').show();
                    let font = obj.fontFamily;
                    if (font.includes('Manjari')) $('#obj-font-family').val("'Manjari', sans-serif");
                    else if (font.includes('Noto')) $('#obj-font-family').val("'Noto Sans Malayalam', sans-serif");
                    else $('#obj-font-family').val(font);
                    $('#obj-font-size').val(obj.fontSize);
                } else { $('#text-properties').hide(); }
            }

            function updateObj(prop, val) { const obj = canvas.getActiveObject(); if (obj) { obj.set(prop, val); canvas.renderAll(); } }
            $('#obj-fill').on('input', function() { updateObj('fill', $(this).val()); });
            $('#obj-font-family').on('change', function() { updateObj('fontFamily', $(this).val()); });
            $('#obj-font-size').on('input', function() { updateObj('fontSize', parseInt($(this).val(), 10)); });

            $('#delete-obj').click(deleteActive);
            $('html').keyup(function(e) { if((e.keyCode === 46 || e.keyCode === 8) && !canvas.getActiveObject()?.isEditing) deleteActive(); });
            function deleteActive() { const obj = canvas.getActiveObject(); if (obj) { canvas.remove(obj); canvas.discardActiveObject(); } }
        });
    </script>
</body>
</html>
