<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web DTP Layout Tool - Prototype</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        /* CSS Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #2c2c2c; color: #fff; }
        
        .top-bar { background: #1e1e1e; padding: 12px 20px; border-bottom: 1px solid #444; font-weight: bold; letter-spacing: 0.5px; }
        
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        .toolbar-left { width: 160px; background: #252525; padding: 15px; border-right: 1px solid #444; }
        .toolbar-left button { display: block; width: 100%; margin-bottom: 12px; padding: 10px; cursor: pointer; background: #3a3a3a; color: white; border: 1px solid #555; border-radius: 4px; transition: background 0.2s; }
        .toolbar-left button:hover { background: #505050; }
        
        .panel-right { width: 260px; background: #252525; padding: 15px; border-left: 1px solid #444; }
        .panel-right h3 { margin-bottom: 15px; font-size: 14px; text-transform: uppercase; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .panel-right label { display: block; margin-bottom: 6px; font-size: 13px; color: #ccc; }
        .panel-right input[type="color"], .panel-right input[type="range"] { width: 100%; margin-bottom: 20px; cursor: pointer; }
        
        .canvas-container-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: #1a1a1a; overflow: auto; padding: 40px; }
        
        /* Fabric.js wrapper styling */
        .canvas-container { box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <header class="top-bar">
        <div>WebLayout Pro</div>
    </header>

    <div class="workspace">
        <aside class="toolbar-left">
            <button id="add-rect">Add Rectangle</button>
            <button id="add-text">Add Text</button>
        </aside>

        <main class="canvas-container-wrapper">
            <canvas id="layout-canvas"></canvas>
        </main>

        <aside class="panel-right">
            <h3>Properties</h3>
            <div id="no-selection" style="color: #777; font-size: 13px; font-style: italic;">Select an object on the canvas to edit its properties.</div>
            
            <div id="properties-form" style="display: none;">
                <label>Fill Color:</label>
                <input type="color" id="obj-color">
                
                <label>Opacity:</label>
                <input type="range" id="obj-opacity" min="0" max="1" step="0.05" value="1">
            </div>
        </aside>
    </div>

    <script>
        // JavaScript Application Logic
        $(document).ready(function() {
            
            // 1. Initialize the Artboard
            const canvas = new fabric.Canvas('layout-canvas', {
                width: 600,
                height: 800,
                backgroundColor: '#ffffff'
            });

            // 2. Toolbar Actions
            $('#add-rect').click(function() {
                const rect = new fabric.Rect({
                    left: canvas.width / 2 - 50, // Center horizontally
                    top: canvas.height / 2 - 50, // Center vertically
                    fill: '#ff5722',
                    width: 100,
                    height: 100,
                    cornerStyle: 'circle',
                    borderColor: '#00a8ff',
                    cornerColor: '#00a8ff',
                    transparentCorners: false
                });
                canvas.add(rect);
                canvas.setActiveObject(rect);
            });

            $('#add-text').click(function() {
                const text = new fabric.IText('Double click to edit text', {
                    left: canvas.width / 2 - 100,
                    top: canvas.height / 2 - 15,
                    fontFamily: 'sans-serif',
                    fill: '#333333',
                    fontSize: 24
                });
                canvas.add(text);
                canvas.setActiveObject(text);
            });

            // 3. Sync Canvas Selection with Right Panel
            canvas.on('selection:created', updatePropertiesPanel);
            canvas.on('selection:updated', updatePropertiesPanel);
            
            canvas.on('selection:cleared', function() {
                $('#no-selection').show();
                $('#properties-form').hide();
            });

            function updatePropertiesPanel(event) {
                const activeObj = event.selected[0];
                if (!activeObj) return;

                $('#no-selection').hide();
                $('#properties-form').show();
                
                // Update inputs based on what is selected
                if (activeObj.fill && typeof activeObj.fill === 'string') {
                    $('#obj-color').val(activeObj.fill);
                }
                $('#obj-opacity').val(activeObj.opacity !== undefined ? activeObj.opacity : 1);
            }

            // 4. Update Canvas when Right Panel inputs change
            $('#obj-color').on('input', function() {
                const activeObj = canvas.getActiveObject();
                if (activeObj) {
                    activeObj.set('fill', $(this).val());
                    canvas.renderAll();
                }
            });

            $('#obj-opacity').on('input', function() {
                const activeObj = canvas.getActiveObject();
                if (activeObj) {
                    activeObj.set('opacity', parseFloat($(this).val()));
                    canvas.renderAll();
                }
            });
            
            // Helpful feature: Delete object on Backspace/Delete key
            $('html').keyup(function(e) {
                if(e.keyCode === 46 || e.keyCode === 8) { // Delete or Backspace
                    const activeObj = canvas.getActiveObject();
                    if (activeObj && !activeObj.isEditing) { // Make sure we aren't typing inside a text box
                        canvas.remove(activeObj);
                    }
                }
            });
            
        });
    </script>
</body>
</html>
